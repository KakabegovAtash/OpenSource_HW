<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Age Prediction</title>
    <!-- Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Vibrant dark aesthetic colors */
            --bg-color-1: #0f172a;
            --bg-color-2: #1e1b4b;
            --bg-color-3: #2e1065;
            
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            
            --accent-primary: #8b5cf6;
            --accent-hover: #7c3aed;
            --success-color: #10b981;
            --error-color: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, var(--bg-color-1), var(--bg-color-2), var(--bg-color-3));
            background-size: 300% 300%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-primary);
            padding: 20px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Glassmorphism Card Container */
        .container {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            transform: translateY(0);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .container:hover {
            transform: translateY(-5px);
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(to right, #e2e8f0, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-secondary);
            font-size: 15px;
            margin-bottom: 32px;
        }

        /* Upload Area */
        .upload-area {
            border: 2px dashed var(--glass-border);
            border-radius: 16px;
            padding: 40px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.02);
            margin-bottom: 24px;
        }

        .upload-area:hover, .upload-area.dragover {
            border-color: var(--accent-primary);
            background: rgba(139, 92, 246, 0.1);
        }

        .upload-icon {
            width: 48px;
            height: 48px;
            margin-bottom: 16px;
            fill: none;
            stroke: var(--text-secondary);
            stroke-width: 1.5;
            transition: stroke 0.3s ease;
        }

        .upload-area:hover .upload-icon {
            stroke: var(--accent-primary);
        }

        .upload-text {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .upload-text span {
            color: var(--accent-primary);
            font-weight: 600;
        }

        input[type="file"] {
            display: none;
        }

        /* Image Preview Area */
        .preview-container {
            display: none;
            margin-bottom: 24px;
            position: relative;
        }

        .preview-image {
            max-width: 100%;
            height: auto;
            max-height: 300px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            object-fit: contain;
        }

        .remove-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            color: white;
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .remove-btn:hover {
            background: var(--error-color);
        }

        /* Analyze Button */
        .btn {
            background: var(--accent-primary);
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 12px;
            width: 100%;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px -1px rgba(139, 92, 246, 0.3);
            display: none;
        }

        .btn:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(139, 92, 246, 0.4);
        }

        .btn:disabled {
            background: #475569;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Loader */
        .loader-container {
            display: none;
            flex-direction: column;
            align-items: center;
            margin: 20px 0;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--glass-border);
            border-top-color: var(--accent-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            margin-top: 16px;
            color: var(--text-secondary);
            font-size: 14px;
            animation: pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }

        /* Results Display */
        .result-card {
            display: none;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 16px;
            padding: 24px;
            margin-top: 24px;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.4s ease;
        }

        .result-card.show {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        .result-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .result-age {
            font-size: 36px;
            font-weight: 700;
            color: var(--accent-primary);
            margin-bottom: 4px;
        }

        .confidence-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 12px;
        }

        .confidence-bar-bg {
            height: 6px;
            width: 100px;
            background: var(--glass-border);
            border-radius: 3px;
            overflow: hidden;
        }

        .confidence-bar-fill {
            height: 100%;
            background: var(--success-color);
            border-radius: 3px;
            width: 0%;
            transition: width 1s ease-out;
        }

        .confidence-text {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .error-msg {
            color: var(--error-color);
            background: rgba(239, 68, 68, 0.1);
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            margin-top: 16px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>AI Age Predictor</h1>
        <p class="subtitle">Upload a photo to estimate the person's age instantly.</p>

        <!-- Upload Form -->
        <form id="uploadForm">
            <div class="upload-area" id="dropZone" onclick="document.getElementById('fileInput').click()">
                <svg class="upload-icon" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3 15v4c0 1.1.9 2 2 2h14a2 2 0 0 0 2-2v-4M17 8l-5-5-5 5M12 3v12" />
                </svg>
                <div class="upload-text">
                    Drag and drop a picture here, or <span>browse files</span>
                </div>
                <input type="file" id="fileInput" accept="image/*" />
            </div>

            <div class="preview-container" id="previewContainer">
                <button type="button" class="remove-btn" id="removeBtn" aria-label="Remove image">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
                <img class="preview-image" id="imagePreview" src="" alt="Image Preview" />
            </div>

            <button type="submit" class="btn" id="analyzeBtn">Analyze Image</button>
        </form>

        <!-- Loader -->
        <div class="loader-container" id="loader">
            <div class="spinner"></div>
            <div class="loading-text">Extracting facial features...</div>
        </div>

        <!-- Error Message -->
        <div class="error-msg" id="errorMsg"></div>

        <!-- Result -->
        <div class="result-card" id="resultCard">
            <div class="result-title">Estimated Age Bracket</div>
            <div class="result-age" id="resultAge">--</div>
            <div class="confidence-container">
                <span class="confidence-text">Confidence Level</span>
                <div class="confidence-bar-bg">
                    <div class="confidence-bar-fill" id="confidenceBar"></div>
                </div>
                <span class="confidence-text" id="confidencePercent">0%</span>
            </div>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const previewContainer = document.getElementById('previewContainer');
        const imagePreview = document.getElementById('imagePreview');
        const removeBtn = document.getElementById('removeBtn');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const uploadForm = document.getElementById('uploadForm');
        
        const loader = document.getElementById('loader');
        const resultCard = document.getElementById('resultCard');
        const resultAge = document.getElementById('resultAge');
        const confidenceBar = document.getElementById('confidenceBar');
        const confidencePercent = document.getElementById('confidencePercent');
        const errorMsg = document.getElementById('errorMsg');

        let currentFile = null;

        // Drag and Drop Logic
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.add('dragover'), false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.remove('dragover'), false);
        });

        dropZone.addEventListener('drop', (e) => {
            let dt = e.dataTransfer;
            let files = dt.files;
            handleFiles(files);
        });

        fileInput.addEventListener('change', function() {
            handleFiles(this.files);
        });

        function handleFiles(files) {
            if (files.length > 0) {
                const file = files[0];
                if (!file.type.startsWith('image/')) {
                    showError('Please upload a valid image file.');
                    return;
                }
                currentFile = file;
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onloadend = function() {
                    imagePreview.src = reader.result;
                    dropZone.style.display = 'none';
                    previewContainer.style.display = 'block';
                    analyzeBtn.style.display = 'block';
                    
                    // Reset previous results
                    resultCard.classList.remove('show');
                    errorMsg.style.display = 'none';
                }
            }
        }

        removeBtn.addEventListener('click', () => {
            currentFile = null;
            fileInput.value = '';
            dropZone.style.display = 'block';
            previewContainer.style.display = 'none';
            analyzeBtn.style.display = 'none';
            resultCard.classList.remove('show');
            errorMsg.style.display = 'none';
        });

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.style.display = 'block';
            loader.style.display = 'none';
            analyzeBtn.disabled = false;
        }

        uploadForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!currentFile) return;

            // UI updates for loading
            analyzeBtn.disabled = true;
            errorMsg.style.display = 'none';
            resultCard.classList.remove('show');
            
            // Switch out button for loader occasionally looks better, but let's just 
            // show the loader container and keep button disabled
            loader.style.display = 'flex';

            const formData = new FormData();
            formData.append('file', currentFile);

            try {
                // Determine our API endpoint dynamically.
                // In this case, our API and UI are served from the same host.
                const response = await fetch('/predict-age/', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || data.error || 'Failed to process image');
                }

                if (data.error) {
                    throw new Error(data.error);
                }

                // Update UI visually
                displayResults(data);

            } catch (err) {
                showError(err.message);
            } finally {
                loader.style.display = 'none';
                analyzeBtn.disabled = false;
            }
        });

        function displayResults(data) {
            let ageBracket = data.age_prediction;
            // The model returns '(25-32)', let's format it nicer without parentheses
            ageBracket = ageBracket.replace(/[()]/g, '');
            
            resultAge.textContent = `${ageBracket} years`;
            
            const conf = Math.round(data.confidence * 100);
            
            // Delay rendering bar for animation effect
            setTimeout(() => {
                confidenceBar.style.width = `${conf}%`;
                confidencePercent.textContent = `${conf}%`;
                
                // Color formatting based on confidence
                if(conf < 50) {
                    confidenceBar.style.background = 'var(--error-color)';
                } else if(conf < 75) {
                    confidenceBar.style.background = '#fbbf24'; // Warning yellow/orange
                } else {
                    confidenceBar.style.background = 'var(--success-color)';
                }
            }, 100);

            resultCard.classList.add('show');
        }
    </script>
</body>
</html>
