name: Build and Push Docker Image

on:
  push:
    branches:
      - main  # Trigger workflow on pushes to the main branch
  pull_request:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        # Only log in if we are not running a PR (i.e. we intend to push)
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          # Push the image if running on the main branch, otherwise just test the build
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/age-prediction-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: self-hosted
    needs: build-and-push
    # Only run the deployment after a successful merge/push to the main branch
    if: github.event_name != 'pull_request'
    
    steps:
      - name: Pull and Run on Local Machine
        run: |
          # 1. Pull the newest image from Docker Hub
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/age-prediction-api:latest
          
          # 2. Stop and remove the old container if it exists (the || true prevents the step from failing if it doesn't exist)
          docker stop age-prediction-container || true
          docker rm age-prediction-container || true
          
          # 3. Start the newly pulled image
          docker run -d --name age-prediction-container -p 8000:8000 --restart unless-stopped ${{ secrets.DOCKERHUB_USERNAME }}/age-prediction-api:latest
